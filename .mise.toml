[env]
# Override this in .mise.local.toml if your Steam library or game path differs.
SOLAR_EXPANSE_ROOT = "C:/Program Files (x86)/Steam/steamapps/common/Solar Expanse"

[tools]
dotnet = "8"

[task_config]
includes = ["scripts"]

[tasks.update-game-icons]
description = "Discover game icon candidates and update docs/game-icons.md"
run = "bash scripts/update-game-icons"
